# Kubernetes deployment configuration for InvoiceMe
# Usage: kubectl apply -f k8s/

apiVersion: apps/v1
kind: Deployment
metadata:
  name: invoiceme-backend
  labels:
    app: invoiceme-backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: invoiceme-backend
  template:
    metadata:
      labels:
        app: invoiceme-backend
    spec:
      containers:
      - name: backend
        image: invoiceme/backend:latest
        ports:
        - containerPort: 3000
        env:
        - name: NODE_ENV
          value: "production"
        - name: DB_HOST
          valueFrom:
            secretKeyRef:
              name: invoiceme-secrets
              key: db-host
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: invoiceme-secrets
              key: db-password
        # Add other environment variables from secrets/config
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 40
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: invoiceme-backend
spec:
  selector:
    app: invoiceme-backend
  ports:
  - protocol: TCP
    port: 80
    targetPort: 3000
  type: LoadBalancer
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: invoiceme-backend-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: invoiceme-backend
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80

