# CI/CD Pipeline for InvoiceMe
# 
# This workflow runs tests, builds artifacts, and optionally deploys the application.
# 
# Required GitHub Secrets:
#   - JWT_SECRET: JWT secret for running tests
#   - JWT_REFRESH_SECRET: JWT refresh secret for running tests
#   - DOCKER_USERNAME: Docker Hub username (optional, for Docker push)
#   - DOCKER_TOKEN: Docker Hub access token (optional, for Docker push)
#   - API_BASE_URL_DEV: Development API URL for Flutter web builds (optional)
#   - API_BASE_URL_STAGING: Staging API URL for Flutter web builds (optional)
#   - API_BASE_URL_PROD: Production API URL for Flutter web builds (optional)
#   - CORS_ORIGIN_PROD: Production CORS origins (optional)

name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs on new pushes
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Environment Validation
  validate-env:
    name: Validate Environment Configuration
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Make validation script executable
        run: chmod +x backend/scripts/validate-env.sh

      - name: Run environment validation
        working-directory: ./backend
        env:
          NODE_ENV: test
          STRICT: false
          JWT_SECRET: ${{ secrets.JWT_SECRET || 'test-jwt-secret-minimum-32-characters-long' }}
          JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET || 'test-refresh-secret-minimum-32-characters-long' }}
          CORS_ORIGIN: '*'
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USERNAME: postgres
          DB_PASSWORD: postgres
          DB_DATABASE: invoiceme
          S3_REGION: us-east-1
          S3_ACCESS_KEY_ID: test
          S3_SECRET_ACCESS_KEY: test
          S3_BUCKET: test
        run: ../backend/scripts/validate-env.sh

  # Backend Tests
  backend-test:
    name: Backend Tests (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20]
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: invoiceme
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: ./backend
        run: npm ci

      - name: Create test database
        run: |
          PGPASSWORD=postgres psql -h localhost -U postgres -c "CREATE DATABASE invoiceme_test;" || true

      - name: Run linter
        working-directory: ./backend
        run: npm run lint

      - name: Run unit tests
        working-directory: ./backend
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USERNAME: postgres
          DB_PASSWORD: postgres
          DB_DATABASE: invoiceme
          DB_TEST_HOST: localhost
          DB_TEST_PORT: 5432
          DB_TEST_USERNAME: postgres
          DB_TEST_PASSWORD: postgres
          DB_TEST_DATABASE: invoiceme_test
          JWT_SECRET: ${{ secrets.JWT_SECRET || 'test-jwt-secret-minimum-32-characters-long' }}
          JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET || 'test-refresh-secret-minimum-32-characters-long' }}
          NODE_ENV: test
        run: npm test

      - name: Run e2e tests
        working-directory: ./backend
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USERNAME: postgres
          DB_PASSWORD: postgres
          DB_DATABASE: invoiceme
          DB_TEST_HOST: localhost
          DB_TEST_PORT: 5432
          DB_TEST_USERNAME: postgres
          DB_TEST_PASSWORD: postgres
          DB_TEST_DATABASE: invoiceme_test
          JWT_SECRET: ${{ secrets.JWT_SECRET || 'test-jwt-secret-minimum-32-characters-long' }}
          JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET || 'test-refresh-secret-minimum-32-characters-long' }}
          NODE_ENV: test
        run: npm run test:e2e

      - name: Generate coverage
        working-directory: ./backend
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USERNAME: postgres
          DB_PASSWORD: postgres
          DB_DATABASE: invoiceme
          DB_TEST_HOST: localhost
          DB_TEST_PORT: 5432
          DB_TEST_USERNAME: postgres
          DB_TEST_PASSWORD: postgres
          DB_TEST_DATABASE: invoiceme_test
          JWT_SECRET: ${{ secrets.JWT_SECRET || 'test-jwt-secret-minimum-32-characters-long' }}
          JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET || 'test-refresh-secret-minimum-32-characters-long' }}
          NODE_ENV: test
        run: |
          npm run test:cov
          npm run test:e2e:cov

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: coverage-node-${{ matrix.node-version }}
          path: |
            backend/coverage/
            backend/coverage-e2e/
          retention-days: 7

      # Optional: Upload to Codecov
      # - name: Upload to Codecov
      #   uses: codecov/codecov-action@v3
      #   with:
      #     files: ./backend/coverage/lcov.info
      #     flags: backend
      #     name: backend-coverage

  # Backend Build
  backend-build:
    name: Backend Build
    runs-on: ubuntu-latest
    needs: [backend-test, validate-env]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: ./backend
        run: npm ci

      - name: Build application
        working-directory: ./backend
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-dist
          path: backend/dist/
          retention-days: 7

  # Backend Docker Build & Push
  backend-docker:
    name: Backend Docker Build
    runs-on: ubuntu-latest
    needs: backend-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: ${{ secrets.DOCKER_USERNAME && secrets.DOCKER_TOKEN }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME || 'invoiceme' }}/invoiceme-backend
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=prod,enable={{is_default_branch}}
            type=raw,value=staging,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.version=${{ github.sha }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build and push Docker image
        if: ${{ secrets.DOCKER_USERNAME && secrets.DOCKER_TOKEN }}
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME || 'invoiceme' }}/invoiceme-backend:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME || 'invoiceme' }}/invoiceme-backend:buildcache,mode=max

      - name: Build Docker image (no push)
        if: ${{ !secrets.DOCKER_USERNAME || !secrets.DOCKER_TOKEN }}
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: invoiceme-backend:latest
          cache-from: type=registry,ref=invoiceme-backend:buildcache
          cache-to: type=inline

      # Note: Docker push requires DOCKER_USERNAME and DOCKER_TOKEN secrets
      # To set up: GitHub Settings → Secrets and variables → Actions → New repository secret

  # Mobile Build
  mobile-build:
    name: Mobile Build (${{ matrix.environment }})
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      matrix:
        environment: [development, staging, production]
        include:
          - environment: development
            api_url: ${{ secrets.API_BASE_URL_DEV || 'http://localhost:3000/api/v1' }}
          - environment: staging
            api_url: ${{ secrets.API_BASE_URL_STAGING || 'https://staging-api.example.com/api/v1' }}
          - environment: production
            api_url: ${{ secrets.API_BASE_URL_PROD || 'https://api.example.com/api/v1' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.x'
          channel: 'stable'

      - name: Get Flutter dependencies
        working-directory: ./mobile
        run: flutter pub get

      - name: Run Flutter analyzer
        working-directory: ./mobile
        run: flutter analyze

      - name: Run Flutter tests
        working-directory: ./mobile
        run: flutter test || echo "No tests found or tests failed"

      - name: Build Flutter web (${{ matrix.environment }})
        working-directory: ./mobile
        run: flutter build web --release --dart-define=API_BASE_URL=${{ matrix.api_url }}

      - name: Upload web build artifact (${{ matrix.environment }})
        uses: actions/upload-artifact@v4
        with:
          name: mobile-web-${{ matrix.environment }}
          path: mobile/build/web/
          retention-days: 7

  # Deploy (Optional - customize based on deployment target)
  deploy:
    name: Deploy (${{ matrix.environment }})
    runs-on: ubuntu-latest
    needs: [backend-docker, mobile-build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      matrix:
        environment: [development, staging, production]
    environment:
      name: ${{ matrix.environment }}
      # Require approval for production deployments
      url: ${{ matrix.environment == 'production' && 'https://app.example.com' || 'https://staging.example.com' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download mobile build artifact
        uses: actions/download-artifact@v4
        with:
          name: mobile-web-${{ matrix.environment }}
          path: mobile/build/web/

      - name: Set environment-specific secrets
        run: |
          echo "Deploying to ${{ matrix.environment }} environment"
          echo "Using environment-specific secrets for ${{ matrix.environment }}"

      # Example: Deploy backend to cloud provider
      # - name: Deploy Backend to ${{ matrix.environment }}
      #   run: |
      #     echo "Deploy backend to ${{ matrix.environment }}"
      #     # Add deployment commands here
      #     # Use ${{ secrets.BACKEND_DEPLOY_KEY_${{ matrix.environment }} }} for environment-specific keys

      # Example: Deploy Flutter web to Netlify
      # - name: Deploy to Netlify (${{ matrix.environment }})
      #   uses: netlify/actions/cli@master
      #   with:
      #     args: deploy --dir=mobile/build/web --prod
      #   env:
      #     NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
      #     NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID_${{ matrix.environment }} }}

      # Example: Deploy Flutter web to Vercel
      # - name: Deploy to Vercel (${{ matrix.environment }})
      #   uses: amondnet/vercel-action@v25
      #   with:
      #     vercel-token: ${{ secrets.VERCEL_TOKEN }}
      #     vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
      #     vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID_${{ matrix.environment }} }}
      #     working-directory: mobile/build/web

      - name: Deployment placeholder (${{ matrix.environment }})
        run: |
          echo "Deployment job for ${{ matrix.environment }} environment completed."
          echo "Customize this job based on your deployment target."
          echo "Common targets: AWS ECS, Google Cloud Run, Azure Container Instances, Render, Railway, Netlify, Vercel"
          echo ""
          echo "Environment-specific secrets available:"
          echo "- Use secrets with environment suffix (e.g., API_KEY_${{ matrix.environment }})"
          echo "- Configure GitHub Environments for approval workflows (production requires approval)"

